<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Smart Luxury - Maputo</title>
    <!-- Tailwind CSS para Estilização -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React e Babel para execução no navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Ícones em SVG para evitar dependências externas que podem falhar
        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const INITIAL_PRODUCTS = [
            { id: 1, name: "Fechadura Biométrica Titanium WiFi", price: 23000, cat: "Segurança", desc: "Acesso via digital e app.", img: "https://images.unsplash.com/photo-1558002038-1091a5759232?auto=format&fit=crop&q=80&w=600" },
            { id: 2, name: "Smart Lock Tuya Ultra WaterProof", price: 16500, cat: "Segurança", desc: "Resistência total à chuva.", img: "https://images.unsplash.com/photo-1639815188546-c43c240ff4df?auto=format&fit=crop&q=80&w=600" },
            { id: 3, name: "Motor de Cortina Girier WiFi", price: 8000, cat: "Conforto", desc: "Controle via Alexa e Google.", img: "https://images.unsplash.com/photo-1513519245088-0e12902e5a38?auto=format&fit=crop&q=80&w=600" },
            { id: 4, name: "Câmera 360 Vigilância IA", price: 12000, cat: "Segurança", desc: "Rastreio inteligente de humanos.", img: "https://images.unsplash.com/photo-1557324232-b8917d3c3dcb?auto=format&fit=crop&q=80&w=600" },
            { id: 5, name: "Interruptor Touch Luxury", price: 5500, cat: "Energia", desc: "Painel em vidro temperado.", img: "https://images.unsplash.com/photo-1558210834-473f430c09ac?auto=format&fit=crop&q=80&w=600" }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState(INITIAL_PRODUCTS);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [category, setCategory] = useState('Todos');
            const [notification, setNotification] = useState(null);
            const [isConsoleOpen, setIsConsoleOpen] = useState(false);
            const [logs, setLogs] = useState([{ time: new Date().toLocaleTimeString(), msg: "Sistema Ativo.", type: 'info' }]);
            const [paymentStep, setPaymentStep] = useState('cart');
            const [paymentMethod, setPaymentMethod] = useState('');
            const [phoneNumber, setPhoneNumber] = useState('');
            const [newProduct, setNewProduct] = useState({ name: '', price: '', cat: 'Segurança', desc: '', img: '' });

            useEffect(() => {
                lucide.createIcons();
            }, [view, isCartOpen, paymentStep, products]);

            const addLog = (msg, type = 'info') => {
                setLogs(prev => [...prev, { time: new Date().toLocaleTimeString(), msg, type }]);
            };

            const addToCart = (product) => {
                setCart(prev => [...prev, { ...product, cartId: Math.random() }]);
                setNotification(`${product.name} no cesto!`);
                addLog(`Adicionado: ${product.name}`, 'success');
                setTimeout(() => setNotification(null), 3000);
            };

            const removeFromCart = (cartId) => {
                setCart(prev => prev.filter(item => item.cartId !== cartId));
                addLog(`Item removido.`, 'warning');
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (!newProduct.name || !newProduct.price) return;
                const p = { ...newProduct, id: Date.now(), price: Number(newProduct.price) };
                setProducts(prev => [p, ...prev]);
                setNewProduct({ name: '', price: '', cat: 'Segurança', desc: '', img: '' });
                addLog(`Admin: Produto ${p.name} criado.`, 'success');
            };

            const handlePayment = (e) => {
                e.preventDefault();
                setPaymentStep('processing');
                setTimeout(() => {
                    setPaymentStep('success');
                    setCart([]);
                    addLog("Pagamento Confirmado.", "success");
                }, 3000);
            };

            const totalValue = cart.reduce((acc, item) => acc + item.price, 0);
            const categories = ['Todos', 'Segurança', 'Conforto', 'Sensores', 'Energia'];
            const filteredProducts = category === 'Todos' ? products : products.filter(p => p.cat === category);

            return (
                <div className="min-h-screen overflow-x-hidden">
                    {notification && (
                        <div className="fixed top-20 right-6 z-[100] bg-white border shadow-xl p-4 rounded-xl flex items-center gap-2">
                            <Icon name="check-circle" className="text-green-500" />
                            <span className="font-bold text-sm">{notification}</span>
                        </div>
                    )}

                    <nav className="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="bg-slate-900 p-1.5 rounded-lg text-white"><Icon name="shield" size={20} /></div>
                            <span className="font-black tracking-tighter text-lg uppercase">Prime<span className="text-blue-600">Smart</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('home')} className={`text-[10px] font-bold uppercase ${view === 'home' ? 'text-blue-600' : 'text-slate-400'}`}>Loja</button>
                            <button onClick={() => setView('admin')} className={`text-[10px] font-bold uppercase ${view === 'admin' ? 'text-blue-600' : 'text-slate-400'}`}>Gestão</button>
                            <button onClick={() => setIsCartOpen(true)} className="relative p-2 bg-slate-900 text-white rounded-lg">
                                <Icon name="shopping-bag" size={18} />
                                {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-blue-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-bold">{cart.length}</span>}
                            </button>
                        </div>
                    </nav>

                    <main className="pt-24 pb-20 px-6 max-w-7xl mx-auto">
                        {view === 'home' && (
                            <>
                                <div className="mb-12">
                                    <h1 className="text-4xl md:text-5xl font-black tracking-tighter mb-4">Elite <span className="text-blue-600">Smart Home</span></h1>
                                    <p className="text-slate-500 text-sm">Transformando residências em Maputo com tecnologia de luxo.</p>
                                </div>
                                <div className="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
                                    {categories.map(c => (
                                        <button key={c} onClick={() => setCategory(c)} className={`px-5 py-2 rounded-full text-[10px] font-bold uppercase transition-all whitespace-nowrap ${category === c ? 'bg-blue-600 text-white' : 'bg-white border text-slate-400'}`}>{c}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                    {filteredProducts.map(p => (
                                        <div key={p.id} className="bg-white border rounded-3xl p-4 hover:shadow-xl transition-all">
                                            <img src={p.img} className="w-full h-48 object-cover rounded-2xl mb-4" alt={p.name} />
                                            <span className="text-[9px] font-bold text-blue-600 uppercase tracking-widest">{p.cat}</span>
                                            <h3 className="font-bold text-slate-800 truncate mb-1">{p.name}</h3>
                                            <p className="text-xl font-black mb-4">{p.price.toLocaleString()} MT</p>
                                            <button onClick={() => addToCart(p)} className="w-full bg-slate-900 text-white py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-blue-600 transition">
                                                <Icon name="plus" size={16} /> <span className="text-[10px] font-bold uppercase">Adicionar</span>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {view === 'admin' && (
                            <div className="grid md:grid-cols-2 gap-10">
                                <div className="bg-white border p-6 rounded-3xl h-fit">
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2"><Icon name="package-plus" className="text-blue-600" /> Novo Produto</h2>
                                    <form onSubmit={handleAddProduct} className="space-y-4">
                                        <input required placeholder="Nome do Produto" className="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:border-blue-500 text-sm" value={newProduct.name} onChange={e => setNewProduct({...newProduct, name: e.target.value})} />
                                        <input required type="number" placeholder="Preço (MT)" className="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:border-blue-500 text-sm" value={newProduct.price} onChange={e => setNewProduct({...newProduct, price: e.target.value})} />
                                        <select className="w-full p-4 bg-slate-50 rounded-xl outline-none border text-sm" value={newProduct.cat} onChange={e => setNewProduct({...newProduct, cat: e.target.value})}>
                                            {categories.filter(c => c !== 'Todos').map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <input placeholder="URL da Imagem" className="w-full p-4 bg-slate-50 rounded-xl outline-none border text-sm" value={newProduct.img} onChange={e => setNewProduct({...newProduct, img: e.target.value})} />
                                        <button className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase text-xs">Salvar Produto</button>
                                    </form>
                                </div>
                                <div className="space-y-3">
                                    <h2 className="text-xl font-black mb-6 italic">Inventário Local</h2>
                                    {products.map(p => (
                                        <div key={p.id} className="bg-white border p-3 rounded-2xl flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <img src={p.img} className="w-10 h-10 rounded-lg object-cover" alt="" />
                                                <div>
                                                    <p className="font-bold text-sm">{p.name}</p>
                                                    <p className="text-[10px] text-slate-400 font-bold uppercase">{p.price.toLocaleString()} MT</p>
                                                </div>
                                            </div>
                                            <button onClick={() => setProducts(products.filter(item => item.id !== p.id))} className="text-slate-300 hover:text-red-500 p-2"><Icon name="trash-2" size={18} /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {isCartOpen && (
                        <div className="fixed inset-0 z-[200] flex justify-end">
                            <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="relative w-full max-w-md bg-white h-full p-8 shadow-2xl flex flex-col">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-2xl font-black uppercase italic tracking-tighter">Carrinho</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="p-2 bg-slate-100 rounded-full"><Icon name="x" size={20} /></button>
                                </div>

                                {paymentStep === 'cart' && (
                                    <div className="flex-1 flex flex-col overflow-hidden">
                                        <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                                            {cart.length === 0 ? <p className="text-center text-slate-400 py-20 font-bold uppercase text-xs">Vazio</p> : 
                                                cart.map(item => (
                                                    <div key={item.cartId} className="flex gap-4 items-center bg-slate-50 p-4 rounded-2xl border">
                                                        <img src={item.img} className="w-12 h-12 rounded-lg object-cover" alt="" />
                                                        <div className="flex-1">
                                                            <p className="text-xs font-bold truncate">{item.name}</p>
                                                            <p className="text-blue-600 font-black text-xs">{item.price.toLocaleString()} MT</p>
                                                        </div>
                                                        <button onClick={() => removeFromCart(item.cartId)} className="text-slate-300 hover:text-red-500"><Icon name="minus-circle" size={20} /></button>
                                                    </div>
                                                ))
                                            }
                                        </div>
                                        {cart.length > 0 && (
                                            <div className="pt-6 border-t mt-4">
                                                <div className="flex justify-between items-center mb-6">
                                                    <span className="font-bold text-slate-400 uppercase text-[10px]">Total</span>
                                                    <span className="text-3xl font-black">{totalValue.toLocaleString()} MT</span>
                                                </div>
                                                <button onClick={() => setPaymentStep('checkout')} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest">Pagar Agora</button>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {paymentStep === 'checkout' && (
                                    <div className="space-y-6">
                                        <button onClick={() => setPaymentStep('cart')} className="text-[10px] font-bold text-blue-600 mb-4 uppercase flex items-center gap-1">Voltar</button>
                                        <div className="grid grid-cols-2 gap-3">
                                            <button onClick={() => setPaymentMethod('mpesa')} className={`p-4 border-2 rounded-2xl transition ${paymentMethod === 'mpesa' ? 'border-red-500 bg-red-50' : 'border-slate-100'}`}>
                                                <span className="font-black text-red-600">M-PESA</span>
                                            </button>
                                            <button onClick={() => setPaymentMethod('emola')} className={`p-4 border-2 rounded-2xl transition ${paymentMethod === 'emola' ? 'border-orange-500 bg-orange-50' : 'border-slate-100'}`}>
                                                <span className="font-black text-orange-600">E-MOLA</span>
                                            </button>
                                        </div>
                                        {paymentMethod && (
                                            <form onSubmit={handlePayment} className="space-y-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-bold text-slate-400 uppercase px-1">Contacto Móvel</label>
                                                    <input required type="tel" placeholder="8x xxx xxxx" className="w-full p-5 bg-slate-50 rounded-2xl font-bold border outline-none focus:border-blue-500 text-lg" value={phoneNumber} onChange={e => setPhoneNumber(e.target.value.replace(/\D/g, '').slice(0, 9))} />
                                                </div>
                                                <button className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase shadow-xl shadow-blue-200">Confirmar</button>
                                            </form>
                                        )}
                                    </div>
                                )}

                                {paymentStep === 'processing' && (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center space-y-4">
                                        <div className="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
                                        <p className="font-bold text-slate-600 uppercase text-[10px]">Processando USSD...</p>
                                    </div>
                                )}

                                {paymentStep === 'success' && (
                                    <div className="flex-1 flex flex-col items-center justify-center text-center space-y-4">
                                        <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center text-white"><Icon name="check-circle" size={32} /></div>
                                        <h3 className="text-2xl font-black italic uppercase">Sucesso!</h3>
                                        <p className="text-slate-500 text-sm">Pedido recebido. Aguarde a notificação no seu telemóvel.</p>
                                        <button onClick={() => { setIsCartOpen(false); setPaymentStep('cart'); }} className="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-xs uppercase mt-6">Concluir</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    <div className={`fixed bottom-0 left-0 right-0 z-[150] bg-slate-900 text-white transition-all ${isConsoleOpen ? 'h-40' : 'h-10'}`}>
                        <div className="h-10 px-6 flex justify-between items-center bg-slate-950 cursor-pointer" onClick={() => setIsConsoleOpen(!isConsoleOpen)}>
                            <span className="text-[9px] font-bold uppercase tracking-widest text-blue-400 flex items-center gap-2"><Icon name="zap" size={10} /> Terminal de Status</span>
                            {isConsoleOpen ? <Icon name="chevron-down" size={14} /> : <Icon name="chevron-up" size={14} />}
                        </div>
                        {isConsoleOpen && (
                            <div className="p-4 h-30 overflow-y-auto font-mono text-[9px] space-y-1 opacity-80">
                                {logs.map((l, i) => (
                                    <div key={i} className="flex gap-4"><span className="text-slate-500">[{l.time}]</span><span>{l.msg}</span></div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
