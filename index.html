<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Smart | Tecnologia que simplifica sua vida</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap');
        
        :root {
            --brand-dark: #0B1C2D;
            --brand-neon: #00F5A0;
            --brand-purple: #7C3AED;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            scroll-behavior: smooth;
            background-color: #ffffff;
            color: #0B1C2D;
        }

        .bg-brand-dark { background-color: var(--brand-dark); }
        .text-brand-neon { color: var(--brand-neon); }
        .bg-brand-neon { background-color: var(--brand-neon); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-nav {
            background: rgba(11, 28, 45, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .hero-section {
            background: linear-gradient(rgba(11, 28, 45, 0.8), rgba(11, 28, 45, 0.8)), 
                        url('https://images.unsplash.com/photo-1558002038-1091a5759232?auto=format&fit=crop&q=80&w=1600');
            background-size: cover;
            background-position: center;
        }

        .card-premium {
            border-radius: 20px;
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
        }

        .card-premium:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 1000;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-up { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const INITIAL_PRODUCTS = [
            { id: 1, name: "Fechadura Biométrica Prime V1", price: 23000, cat: "Segurança", rating: 5, desc: "Controle total via Wi-Fi 2.4GHz. Compatível com Alexa e Google Home. Instalação simples.", img: "https://images.unsplash.com/photo-1558002038-1091a5759232?auto=format&fit=crop&q=80&w=800", specs: ["WiFi 2.4Ghz", "Biometria", "Económica"] },
            { id: 2, name: "Interruptor Touch Neon", price: 4500, cat: "Iluminação", rating: 4, desc: "Painel de vidro temperado com retroiluminação LED verde neon.", img: "https://images.unsplash.com/photo-1558210834-473f430c09ac?auto=format&fit=crop&q=80&w=800", specs: ["Touch", "WiFi", "Agendamento"] },
            { id: 3, name: "Câmara 360 AI Guard", price: 12500, cat: "Segurança", rating: 5, desc: "Visão noturna a cores e rastreio inteligente de movimento humano.", img: "https://images.unsplash.com/photo-1557324232-b8917d3c3dcb?auto=format&fit=crop&q=80&w=800", specs: ["4K", "Audio 2 vias", "Cloud"] },
            { id: 4, name: "Motor de Cortina Smart", price: 8900, cat: "Automação", rating: 4, desc: "Automatize suas cortinas e controle por voz ou app. Silencioso e robusto.", img: "https://images.unsplash.com/photo-1513519245088-0e12902e5a38?auto=format&fit=crop&q=80&w=800", specs: ["Silencioso", "Alexa", "Google Home"] },
            { id: 5, name: "Hub Central Zigbee 3.0", price: 6200, cat: "Automação", rating: 5, desc: "O cérebro da sua casa inteligente. Conecte até 50 dispositivos.", img: "https://images.unsplash.com/photo-1558002038-1091a5759232?auto=format&fit=crop&q=80&w=800", specs: ["Zigbee 3.0", "Estável", "Ethernet"] },
            { id: 6, name: "Smart Speaker Pro", price: 9500, cat: "Assistentes Virtuais", rating: 5, desc: "Som premium e assistente virtual integrada para comandos de voz.", img: "https://images.unsplash.com/photo-1589492477829-5e65395b66cc?auto=format&fit=crop&q=80&w=800", specs: ["Bluetooth 5.0", "Dolby Audio", "Smart"] }
        ];

        function App() {
            const [page, setPage] = useState('home'); 
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [notification, setNotification] = useState(null);
            const [user, setUser] = useState(null); // Simulação de Login

            useEffect(() => {
                lucide.createIcons();
                window.scrollTo(0, 0);
            }, [page, selectedProduct, isCartOpen]);

            const addToCart = (product) => {
                setCart(prev => {
                    const exists = prev.find(item => item.id === product.id);
                    if (exists) return prev.map(item => item.id === product.id ? {...item, qty: item.qty + 1} : item);
                    return [...prev, { ...product, qty: 1 }];
                });
                setNotification(`"${product.name}" adicionado ao carrinho!`);
                setTimeout(() => setNotification(null), 3000);
            };

            const totalValue = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            // --- COMPONENTES GERAIS ---

            const Navbar = () => (
                <nav className="fixed top-0 w-full z-[100] glass-nav text-white px-6 md:px-12 py-4 flex justify-between items-center border-b border-white/10">
                    <div className="flex items-center gap-2 cursor-pointer" onClick={() => setPage('home')}>
                        <div className="bg-brand-neon p-2 rounded-lg text-brand-dark">
                            <Icon name="zap" size={24} />
                        </div>
                        <span className="font-black text-xl tracking-tighter uppercase italic">
                            Prime<span className="text-brand-neon">Smart</span>
                        </span>
                    </div>

                    <div className="hidden lg:flex items-center gap-8 text-[11px] font-bold uppercase tracking-widest">
                        <button onClick={() => setPage('home')} className={page === 'home' ? 'text-brand-neon' : 'hover:text-brand-neon transition'}>Home</button>
                        <button onClick={() => setPage('shop')} className={page === 'shop' ? 'text-brand-neon' : 'hover:text-brand-neon transition'}>Produtos</button>
                        <button onClick={() => setPage('about')} className={page === 'about' ? 'text-brand-neon' : 'hover:text-brand-neon transition'}>Sobre</button>
                        <button onClick={() => setPage('contact')} className={page === 'contact' ? 'text-brand-neon' : 'hover:text-brand-neon transition'}>Contato</button>
                    </div>

                    <div className="flex items-center gap-5">
                        <button onClick={() => setPage(user ? 'account' : 'login')} className="p-2 hover:bg-white/10 rounded-full transition">
                            <Icon name="user" size={20} />
                        </button>
                        <button onClick={() => setIsCartOpen(true)} className="relative p-3 bg-brand-neon text-brand-dark rounded-xl font-bold btn-premium">
                            <Icon name="shopping-cart" size={18} />
                            {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-white text-brand-dark text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-brand-dark">{cart.length}</span>}
                        </button>
                    </div>
                </nav>
            );

            const Footer = () => (
                <footer className="bg-brand-dark text-white pt-20 pb-10 px-6 md:px-12">
                    <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 mb-16">
                        <div className="space-y-6">
                            <div className="flex items-center gap-2">
                                <div className="bg-brand-neon p-2 rounded-lg text-brand-dark"><Icon name="zap" size={20} /></div>
                                <span className="font-black text-xl uppercase italic">Prime<span className="text-brand-neon">Smart</span></span>
                            </div>
                            <p className="text-white/60 text-sm leading-relaxed">Tecnologia que simplifica sua vida. Especialistas em automação residencial em Moçambique.</p>
                            <div className="flex gap-4">
                                <Icon name="facebook" className="text-brand-neon cursor-pointer" />
                                <Icon name="instagram" className="text-brand-neon cursor-pointer" />
                                <Icon name="linkedin" className="text-brand-neon cursor-pointer" />
                            </div>
                        </div>
                        <div>
                            <h4 className="font-bold uppercase text-xs tracking-widest mb-8 text-brand-neon">Links Rápidos</h4>
                            <ul className="space-y-4 text-sm text-white/60">
                                <li className="hover:text-brand-neon cursor-pointer" onClick={() => setPage('shop')}>Produtos</li>
                                <li className="hover:text-brand-neon cursor-pointer" onClick={() => setPage('about')}>Sobre Nós</li>
                                <li className="hover:text-brand-neon cursor-pointer" onClick={() => setPage('contact')}>Contato</li>
                                <li className="hover:text-brand-neon cursor-pointer">Blog</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold uppercase text-xs tracking-widest mb-8 text-brand-neon">Atendimento</h4>
                            <ul className="space-y-4 text-sm text-white/60">
                                <li>Maputo, Moçambique</li>
                                <li>+258 84 000 0000</li>
                                <li>contato@primesmart.co.mz</li>
                                <li>Suporte 24/7</li>
                            </ul>
                        </div>
                        <div>
                            <h4 className="font-bold uppercase text-xs tracking-widest mb-8 text-brand-neon">Newsletter</h4>
                            <p className="text-white/60 text-xs mb-4">Receba novidades e ofertas exclusivas.</p>
                            <div className="flex bg-white/5 p-1 rounded-xl">
                                <input type="email" placeholder="Seu email" className="bg-transparent flex-1 px-4 py-3 outline-none text-xs" />
                                <button className="bg-brand-neon text-brand-dark px-4 py-2 rounded-lg font-bold text-[10px] uppercase">Enviar</button>
                            </div>
                        </div>
                    </div>
                    <div className="border-t border-white/5 pt-10 text-center text-white/40 text-[10px] uppercase tracking-[3px]">
                        © 2024 Prime Smart - Tecnologia que simplifica sua vida.
                    </div>
                </footer>
            );

            // --- VISTAS ---

            const HomeView = () => (
                <div className="animate-up">
                    {/* Hero Section */}
                    <section className="hero-section h-[85vh] flex items-center justify-center text-center px-6 rounded-b-[40px] mb-20 overflow-hidden">
                        <div className="max-w-4xl space-y-8">
                            <h1 className="text-5xl md:text-8xl font-black text-white tracking-tighter uppercase italic leading-[0.9]">
                                Transforme Sua <br/> <span className="text-brand-neon">Casa Inteligente</span>
                            </h1>
                            <p className="text-white/80 text-lg md:text-xl font-light max-w-2xl mx-auto">Segurança, conforto e automação ao seu alcance com tecnologia de ponta.</p>
                            <div className="flex flex-wrap justify-center gap-4">
                                <button onClick={() => setPage('shop')} className="px-10 py-5 bg-brand-neon text-brand-dark rounded-full font-bold uppercase text-xs tracking-widest btn-premium">🛒 Comprar Agora</button>
                                <button onClick={() => setPage('shop')} className="px-10 py-5 bg-white text-brand-dark rounded-full font-bold uppercase text-xs tracking-widest btn-premium">📦 Ver Produtos</button>
                            </div>
                        </div>
                    </section>

                    {/* Categories */}
                    <section className="px-6 md:px-12 max-w-7xl mx-auto mb-32">
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                            {[
                                { name: 'Iluminação Inteligente', icon: 'sun' },
                                { name: 'Segurança', icon: 'shield' },
                                { name: 'Automação', icon: 'settings' },
                                { name: 'Assistentes Virtuais', icon: 'mic' }
                            ].map(cat => (
                                <div key={cat.name} className="bg-slate-50 p-8 card-premium text-center flex flex-col items-center gap-4 cursor-pointer group hover:bg-brand-dark hover:text-white transition-colors">
                                    <div className="w-16 h-16 bg-white shadow-lg rounded-2xl flex items-center justify-center text-brand-dark group-hover:bg-brand-neon"><Icon name={cat.icon} size={28} /></div>
                                    <h3 className="font-bold text-xs uppercase tracking-widest">{cat.name}</h3>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Featured Products */}
                    <section className="px-6 md:px-12 max-w-7xl mx-auto mb-32">
                        <div className="flex justify-between items-end mb-16">
                            <div>
                                <h2 className="text-3xl font-black uppercase italic text-brand-dark">Produtos em Destaque</h2>
                                <p className="text-slate-400 text-sm">Hardware selecionado para alta performance.</p>
                            </div>
                            <button onClick={() => setPage('shop')} className="text-brand-purple font-bold text-xs uppercase tracking-widest flex items-center gap-2">Ver tudo <Icon name="arrow-right" size={14} /></button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {INITIAL_PRODUCTS.slice(0, 3).map(p => (
                                <div key={p.id} className="card-premium bg-white p-6 relative group">
                                    <div className="aspect-square rounded-2xl overflow-hidden mb-6 bg-slate-100">
                                        <img src={p.img} className="w-full h-full object-cover transition-transform group-hover:scale-110" />
                                    </div>
                                    <div className="flex text-yellow-400 mb-2">
                                        {[...Array(p.rating)].map((_, i) => <Icon key={i} name="star" size={12} className="fill-current" />)}
                                    </div>
                                    <h3 className="font-bold text-lg mb-1">{p.name}</h3>
                                    <p className="text-2xl font-black text-brand-dark mb-6">{p.price.toLocaleString()} MZN</p>
                                    <button onClick={() => addToCart(p)} className="w-full py-4 bg-brand-dark text-white rounded-xl font-bold uppercase text-[10px] tracking-widest btn-premium hover:bg-brand-neon hover:text-brand-dark">Adicionar ao Carrinho</button>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Benefits */}
                    <section className="bg-slate-50 py-20 px-6 md:px-12 mb-32">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12">
                            {[
                                { title: 'Entrega Rápida', desc: 'Em toda Maputo', icon: 'truck' },
                                { title: 'Pagamento Seguro', desc: 'M-Pesa e e-Mola', icon: 'lock' },
                                { title: 'Suporte 24/7', desc: 'Sempre disponíveis', icon: 'phone-call' },
                                { title: 'Garantia', desc: '12 Meses incluída', icon: 'refresh-ccw' }
                            ].map(b => (
                                <div key={b.title} className="flex flex-col items-center text-center gap-3">
                                    <Icon name={b.icon} size={32} className="text-brand-neon" />
                                    <h4 className="font-bold uppercase text-xs">{b.title}</h4>
                                    <p className="text-slate-400 text-xs">{b.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Testimonials */}
                    <section className="px-6 md:px-12 max-w-4xl mx-auto mb-32 text-center">
                        <div className="bg-brand-dark text-white p-12 rounded-[40px] relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-10 text-white/5"><Icon name="quote" size={150} /></div>
                            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?auto=format&fit=crop&q=80&w=150" className="w-20 h-20 rounded-full mx-auto mb-6 border-4 border-brand-neon object-cover" />
                            <p className="text-xl italic mb-6">“A Prime Smart mudou completamente minha casa! Agora controlo tudo pelo telemóvel e sinto-me muito mais seguro.”</p>
                            <span className="font-bold text-brand-neon uppercase tracking-widest text-xs">– Carlos Santos, Cliente Satisfeito</span>
                        </div>
                    </section>
                </div>
            );

            const ShopView = () => (
                <div className="animate-up py-10">
                    <div className="flex flex-col md:flex-row gap-12">
                        <aside className="w-full md:w-64 space-y-10">
                            <div>
                                <h4 className="font-bold uppercase text-[10px] tracking-widest text-slate-400 mb-6">Categorias</h4>
                                <div className="space-y-2">
                                    {['Todos', 'Iluminação', 'Segurança', 'Automação', 'Assistentes'].map(c => (
                                        <button key={c} className="w-full text-left px-4 py-3 rounded-xl text-sm font-medium hover:bg-slate-100 transition">
                                            {c}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <h4 className="font-bold uppercase text-[10px] tracking-widest text-slate-400 mb-6">Preço</h4>
                                <input type="range" className="w-full accent-brand-neon" />
                                <div className="flex justify-between text-[10px] mt-2 font-bold uppercase">
                                    <span>0 MZN</span>
                                    <span>50.000 MZN</span>
                                </div>
                            </div>
                        </aside>

                        <div className="flex-1">
                            <div className="flex justify-between items-center mb-10">
                                <h2 className="text-3xl font-black uppercase italic">Loja</h2>
                                <select className="bg-slate-50 border-none rounded-xl px-4 py-3 text-xs font-bold uppercase outline-none">
                                    <option>Mais recentes</option>
                                    <option>Menor preço</option>
                                    <option>Maior preço</option>
                                </select>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {INITIAL_PRODUCTS.map(p => (
                                    <div key={p.id} className="card-premium bg-white p-5 cursor-pointer" onClick={() => { setSelectedProduct(p); setPage('details'); }}>
                                        <div className="aspect-square rounded-2xl overflow-hidden mb-6">
                                            <img src={p.img} className="w-full h-full object-cover" />
                                        </div>
                                        <h3 className="font-bold mb-1 truncate">{p.name}</h3>
                                        <p className="text-xl font-black text-brand-dark">{p.price.toLocaleString()} MZN</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ProductDetailsView = () => {
                const p = selectedProduct;
                if (!p) return null;
                return (
                    <div className="animate-up py-10">
                        <button onClick={() => setPage('shop')} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-10 hover:text-brand-dark"><Icon name="arrow-left" size={14} /> Voltar para Loja</button>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-20">
                            <div className="space-y-6">
                                <div className="aspect-square rounded-[40px] overflow-hidden shadow-2xl">
                                    <img src={p.img} className="w-full h-full object-cover" />
                                </div>
                                <div className="grid grid-cols-4 gap-4">
                                    {[1,2,3,4].map(i => <div key={i} className="aspect-square bg-slate-100 rounded-2xl border hover:border-brand-neon cursor-pointer"></div>)}
                                </div>
                            </div>
                            <div className="space-y-8">
                                <div>
                                    <span className="text-brand-neon bg-brand-dark px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest mb-4 inline-block">{p.cat}</span>
                                    <h1 className="text-4xl md:text-5xl font-black uppercase italic mb-2">{p.name}</h1>
                                    <div className="flex items-center gap-2 mb-6">
                                        <div className="flex text-yellow-400">
                                            {[...Array(5)].map((_, i) => <Icon key={i} name="star" size={14} className="fill-current" />)}
                                        </div>
                                        <span className="text-xs text-slate-400 font-bold">(24 Avaliações)</span>
                                    </div>
                                    <p className="text-5xl font-black text-brand-dark mb-6">{p.price.toLocaleString()} <span className="text-lg">MZN</span></p>
                                    <div className="text-green-500 flex items-center gap-2 text-xs font-bold uppercase mb-8"><Icon name="check" size={14} /> Em Stock - Pronta Entrega</div>
                                    <p className="text-slate-500 leading-relaxed mb-10">{p.desc}</p>
                                </div>

                                <div className="space-y-4 mb-10">
                                    <h4 className="font-bold uppercase text-xs tracking-widest text-slate-400 border-b pb-4">Especificações Técnicas</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        {p.specs.map(s => <div key={s} className="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl text-[10px] font-bold uppercase tracking-widest"><Icon name="zap" className="text-brand-neon" size={14} /> {s}</div>)}
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4">
                                    <button onClick={() => addToCart(p)} className="flex-1 py-5 bg-brand-dark text-white rounded-2xl font-bold uppercase text-xs tracking-widest btn-premium">Adicionar ao Carrinho</button>
                                    <button onClick={() => { addToCart(p); setPage('checkout'); }} className="flex-1 py-5 bg-brand-neon text-brand-dark rounded-2xl font-bold uppercase text-xs tracking-widest btn-premium">Comprar Agora</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const CheckoutView = () => {
                const [step, setStep] = useState(1);
                const [payMethod, setPayMethod] = useState('mpesa');

                return (
                    <div className="animate-up max-w-5xl mx-auto py-10">
                        <div className="flex justify-center items-center gap-4 mb-20">
                            {[1, 2, 3].map(n => (
                                <div key={n} className="flex items-center gap-4">
                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black ${step >= n ? 'bg-brand-neon text-brand-dark' : 'bg-slate-100 text-slate-300'}`}>{n}</div>
                                    {n < 3 && <div className={`w-12 h-1 bg-slate-100 ${step > n ? 'bg-brand-neon' : ''}`}></div>}
                                </div>
                            ))}
                        </div>

                        {step === 1 && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-20">
                                <div className="space-y-8">
                                    <h2 className="text-3xl font-black uppercase italic">Dados Pessoais</h2>
                                    <div className="space-y-4">
                                        <input type="text" placeholder="Nome Completo" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition" />
                                        <input type="tel" placeholder="Número de Telefone" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition" />
                                        <input type="text" placeholder="Endereço de Entrega" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition" />
                                        <input type="text" placeholder="Cidade (ex: Maputo)" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition" />
                                    </div>
                                    <button onClick={() => setStep(2)} className="w-full py-5 bg-brand-dark text-white rounded-2xl font-bold uppercase text-xs tracking-widest btn-premium">Seguinte: Pagamento</button>
                                </div>
                                <div className="bg-slate-50 p-10 rounded-[40px] border border-slate-100 h-fit">
                                    <h4 className="font-bold uppercase text-xs tracking-widest text-slate-400 mb-8">Resumo</h4>
                                    <div className="space-y-4 mb-8">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex justify-between items-center text-sm font-bold">
                                                <span>{item.name} x{item.qty}</span>
                                                <span>{(item.price * item.qty).toLocaleString()} MZN</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="border-t pt-6 space-y-4">
                                        <div className="flex justify-between text-slate-400 text-xs font-bold uppercase"><span>Subtotal</span><span>{totalValue.toLocaleString()} MZN</span></div>
                                        <div className="flex justify-between text-slate-400 text-xs font-bold uppercase"><span>Entrega</span><span>Grátis</span></div>
                                        <div className="flex justify-between text-2xl font-black"><span>Total</span><span>{totalValue.toLocaleString()} MZN</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="max-w-xl mx-auto space-y-12">
                                <h2 className="text-3xl font-black uppercase italic text-center">Método de Pagamento</h2>
                                <div className="grid grid-cols-2 gap-6">
                                    <button onClick={() => setPayMethod('mpesa')} className={`p-8 rounded-[30px] border-4 transition-all flex flex-col items-center gap-4 ${payMethod === 'mpesa' ? 'border-brand-neon bg-brand-neon/5' : 'border-slate-100'}`}>
                                        <div className="w-16 h-16 bg-red-600 rounded-full flex items-center justify-center text-white font-black italic text-xl">M</div>
                                        <span className="font-black text-xs uppercase italic">M-Pesa</span>
                                    </button>
                                    <button onClick={() => setPayMethod('emola')} className={`p-8 rounded-[30px] border-4 transition-all flex flex-col items-center gap-4 ${payMethod === 'emola' ? 'border-brand-neon bg-brand-neon/5' : 'border-slate-100'}`}>
                                        <div className="w-16 h-16 bg-orange-500 rounded-full flex items-center justify-center text-white font-black italic text-xl">e</div>
                                        <span className="font-black text-xs uppercase italic">e-Mola</span>
                                    </button>
                                </div>
                                <div className="space-y-6">
                                    <p className="text-center text-slate-400 text-xs font-bold uppercase">Insira o seu número para receber o pedido de PIN</p>
                                    <input type="tel" placeholder="8x xxx xxxx" className="w-full p-6 bg-slate-100 rounded-3xl text-center text-3xl font-black outline-none focus:ring-4 ring-brand-neon/20" />
                                    <button onClick={() => { setStep(3); setCart([]); }} className="w-full py-6 bg-brand-dark text-white rounded-3xl font-black uppercase text-sm tracking-widest btn-premium">Confirmar Pagamento</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="text-center py-20 animate-up">
                                <div className="w-32 h-32 bg-brand-neon rounded-full flex items-center justify-center text-brand-dark mx-auto mb-10 shadow-2xl shadow-brand-neon/20"><Icon name="party-popper" size={50} /></div>
                                <h2 className="text-5xl font-black uppercase italic mb-4">Pagamento Confirmado!</h2>
                                <p className="text-slate-400 text-lg mb-12">Obrigado por comprar na Prime Smart 🎉 <br/> Entraremos em contacto para agendar a entrega.</p>
                                <button onClick={() => setPage('home')} className="px-12 py-5 bg-brand-dark text-white rounded-2xl font-bold uppercase text-xs tracking-widest btn-premium">Voltar ao Início</button>
                            </div>
                        )}
                    </div>
                );
            };

            const AboutView = () => (
                <div className="animate-up py-10 space-y-32">
                    <section className="grid grid-cols-1 lg:grid-cols-2 gap-20 items-center">
                        <div className="rounded-[40px] overflow-hidden shadow-2xl">
                            <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&q=80&w=1000" />
                        </div>
                        <div className="space-y-8">
                            <h2 className="text-5xl font-black uppercase italic">Quem Somos</h2>
                            <p className="text-slate-500 leading-relaxed">A Prime Smart é uma empresa moçambicana especializada em soluções de automação residencial. Nascemos com o propósito de democratizar a tecnologia e transformar lares comuns em espaços inteligentes, seguros e eficientes.</p>
                            <div className="grid grid-cols-2 gap-8">
                                <div className="p-8 bg-slate-50 rounded-[30px]">
                                    <h4 className="font-black text-brand-neon text-xl mb-2 uppercase italic">Missão</h4>
                                    <p className="text-xs text-slate-400 font-medium">Levar tecnologia acessível para todos os moçambicanos.</p>
                                </div>
                                <div className="p-8 bg-slate-50 rounded-[30px]">
                                    <h4 className="font-black text-brand-neon text-xl mb-2 uppercase italic">Visão</h4>
                                    <p className="text-xs text-slate-400 font-medium">Ser a referência em smart homes em Moçambique.</p>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );

            const ContactView = () => (
                <div className="animate-up py-10">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-20">
                        <div className="space-y-12">
                            <h2 className="text-5xl font-black uppercase italic">Vamos Conversar?</h2>
                            <div className="space-y-6">
                                <div className="flex gap-6 items-center">
                                    <div className="w-14 h-14 bg-brand-dark text-brand-neon rounded-2xl flex items-center justify-center"><Icon name="map-pin" /></div>
                                    <div><p className="font-bold text-slate-400 uppercase text-[10px]">Localização</p><p className="font-bold">Maputo, Moçambique</p></div>
                                </div>
                                <div className="flex gap-6 items-center">
                                    <div className="w-14 h-14 bg-brand-dark text-brand-neon rounded-2xl flex items-center justify-center"><Icon name="phone" /></div>
                                    <div><p className="font-bold text-slate-400 uppercase text-[10px]">Telefone</p><p className="font-bold">+258 84 000 0000</p></div>
                                </div>
                                <div className="flex gap-6 items-center">
                                    <div className="w-14 h-14 bg-brand-dark text-brand-neon rounded-2xl flex items-center justify-center"><Icon name="mail" /></div>
                                    <div><p className="font-bold text-slate-400 uppercase text-[10px]">Email</p><p className="font-bold">contato@primesmart.co.mz</p></div>
                                </div>
                            </div>
                        </div>
                        <form className="bg-white p-10 rounded-[40px] shadow-2xl space-y-4 border border-slate-50">
                            <input type="text" placeholder="Seu Nome" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition" />
                            <input type="email" placeholder="Seu Email" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition" />
                            <textarea placeholder="Sua Mensagem" rows="5" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition"></textarea>
                            <button className="w-full py-5 bg-brand-dark text-white rounded-2xl font-bold uppercase text-xs tracking-widest btn-premium hover:bg-brand-neon hover:text-brand-dark transition-all">Enviar Mensagem</button>
                        </form>
                    </div>
                </div>
            );

            const LoginView = () => (
                <div className="animate-up py-20 flex justify-center">
                    <div className="w-full max-w-md bg-white p-12 rounded-[40px] shadow-2xl border border-slate-50 text-center">
                        <div className="bg-brand-dark text-brand-neon w-20 h-20 rounded-[25px] flex items-center justify-center mx-auto mb-8"><Icon name="user" size={32} /></div>
                        <h2 className="text-3xl font-black uppercase italic mb-10">Bem-vindo à <br/> <span className="text-brand-neon bg-brand-dark px-2">Prime Smart</span></h2>
                        <div className="space-y-4 mb-8 text-left">
                            <input type="email" placeholder="Email" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition font-medium" />
                            <input type="password" placeholder="Senha" className="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-brand-neon transition font-medium" />
                            <div className="flex justify-between items-center px-2">
                                <label className="flex items-center gap-2 text-xs font-bold text-slate-400 uppercase tracking-widest cursor-pointer"><input type="checkbox" className="accent-brand-neon" /> Lembrar-me</label>
                                <button className="text-[10px] font-bold text-brand-purple uppercase tracking-widest">Esqueci a Senha</button>
                            </div>
                        </div>
                        <button onClick={() => { setUser({ name: 'Cliente Prime' }); setPage('home'); }} className="w-full py-5 bg-brand-dark text-white rounded-2xl font-bold uppercase text-xs tracking-widest btn-premium mb-4">Entrar</button>
                        <button className="w-full py-5 bg-slate-50 border border-slate-100 rounded-2xl font-bold uppercase text-xs tracking-widest flex items-center justify-center gap-3"><Icon name="chrome" size={16} /> Entrar com Google</button>
                        <p className="mt-8 text-xs text-slate-400 font-bold uppercase tracking-widest">Ainda não tem conta? <button onClick={() => setPage('register')} className="text-brand-neon bg-brand-dark px-2">Criar Agora</button></p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-white">
                    <Navbar />
                    
                    <main className="pt-24 pb-24 px-6 md:px-12 max-w-[1400px] mx-auto min-h-[70vh]">
                        {page === 'home' && <HomeView />}
                        {page === 'shop' && <ShopView />}
                        {page === 'details' && <ProductDetailsView />}
                        {page === 'checkout' && <CheckoutView />}
                        {page === 'about' && <AboutView />}
                        {page === 'contact' && <ContactView />}
                        {page === 'login' && <LoginView />}
                    </main>

                    <Footer />

                    {/* WhatsApp Button */}
                    <div className="whatsapp-float btn-premium" onClick={() => window.open('https://wa.me/258840000000', '_blank')}>
                        <Icon name="message-circle" size={32} />
                    </div>

                    {/* Notification Toast */}
                    {notification && (
                        <div className="fixed top-28 right-10 z-[200] bg-brand-dark text-white border-l-4 border-brand-neon px-8 py-5 rounded-2xl shadow-2xl animate-up font-bold text-[10px] uppercase tracking-widest flex items-center gap-4">
                            <Icon name="shopping-bag" className="text-brand-neon" />
                            {notification}
                        </div>
                    )}

                    {/* Cart Drawer */}
                    {isCartOpen && (
                        <div className="fixed inset-0 z-[1000] animate-up">
                            <div className="absolute inset-0 bg-brand-dark/80 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                            <div className="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-2xl flex flex-col p-10">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-3xl font-black uppercase italic tracking-tighter">Carrinho</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center"><Icon name="x" /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto no-scrollbar space-y-6">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-20 opacity-20"><Icon name="shopping-bag" size={60} className="mx-auto mb-4" /><p className="font-black uppercase tracking-widest text-xs">Vazio</p></div>
                                    ) : cart.map(item => (
                                        <div key={item.id} className="flex gap-6 items-center border-b border-slate-100 pb-6">
                                            <img src={item.img} className="w-20 h-20 rounded-2xl object-cover" />
                                            <div className="flex-1">
                                                <h4 className="font-bold text-sm uppercase">{item.name}</h4>
                                                <p className="text-brand-neon bg-brand-dark px-2 py-0.5 rounded inline-block text-[10px] font-black mt-1">{item.price.toLocaleString()} MZN</p>
                                                <div className="flex items-center gap-4 mt-2">
                                                    <span className="text-[10px] font-bold text-slate-400 uppercase">Qtd: {item.qty}</span>
                                                    <button onClick={() => setCart(cart.filter(i => i.id !== item.id))} className="text-red-500 text-[10px] font-bold uppercase">Remover</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {cart.length > 0 && (
                                    <div className="pt-10 space-y-6">
                                        <div className="flex justify-between items-end">
                                            <span className="text-slate-400 font-bold uppercase text-[10px]">Total</span>
                                            <span className="text-3xl font-black">{totalValue.toLocaleString()} MZN</span>
                                        </div>
                                        <button onClick={() => { setIsCartOpen(false); setPage('checkout'); }} className="w-full py-6 bg-brand-dark text-white rounded-3xl font-black uppercase text-xs tracking-widest btn-premium">Finalizar Compra</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
